version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: avaria-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU desteği (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  avaria:
    build: .
    container_name: avaria-app
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OPENAI_API_KEY=NA
    restart: unless-stopped

volumes:
  ollama_data:
